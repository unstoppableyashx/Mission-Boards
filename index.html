<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Boards | Command Center</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-body: #0f172a; --bg-card: #1e293b; --bg-hover: #334155;
            --text-main: #f8fafc; --text-secondary: #94a3b8;
            --accent-blue: #3b82f6; --accent-green: #10b981; --accent-red: #ef4444;
            --border-color: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        .hidden { display: none !important; }
        .container { width: 100%; max-width: 1280px; margin: 0 auto; padding: 0 24px; }

        /* Loading & Auth */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-body); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--bg-hover); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #auth-container { flex: 1; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--bg-card); padding: 40px; border-radius: 16px; border: 1px solid var(--border-color); width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--bg-body); border: 1px solid var(--border-color); color: white; border-radius: 8px; outline: none; }
        
        /* UI Elements */
        .navbar { background: var(--bg-card); border-bottom: 1px solid var(--border-color); height: 70px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100; }
        .nav-content { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .day-badge { background: rgba(59,130,246,0.15); color: var(--accent-blue); padding: 4px 10px; border-radius: 6px; font-family: 'JetBrains Mono'; margin-left: 10px; }
        
        .btn { display: inline-flex; align-items: center; justify-content: center; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
        .btn-primary { background: var(--accent-blue); color: white; width: 100%; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); }
        .btn-danger { background: rgba(239,68,68,0.1); color: var(--accent-red); border: 1px solid rgba(239,68,68,0.2); }

        .status-panel { background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border-color); padding: 20px; margin: 30px 0; display: flex; align-items: center; }
        .progress-track { width: 100%; height: 8px; background: var(--bg-body); border-radius: 4px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: var(--accent-green); width: 0%; transition: width 0.6s ease; }

        #content-area { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 24px; padding-bottom: 50px; }
        .video-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; transition: transform 0.2s; position: relative; }
        .video-header { padding: 16px; border-bottom: 1px solid var(--border-color); background: rgba(255,255,255,0.02); }
        .video-title { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-subject { font-size: 0.75rem; text-transform: uppercase; color: var(--text-secondary); letter-spacing: 1px; }

        /* --- PAUSE OVERLAY (The Magic Curtain) --- */
        .pause-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9); /* Opaque dark blue */
            display: none; /* Hidden by default */
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 50; cursor: pointer;
        }
        .resume-icon {
            font-size: 3rem; color: var(--accent-blue);
            margin-bottom: 10px;
            transition: transform 0.2s;
        }
        .pause-overlay:hover .resume-icon { transform: scale(1.1); color: white; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div style="font-family:'JetBrains Mono'; color:var(--text-secondary);">ESTABLISHING UPLINK...</div>
    </div>

    <div id="auth-container" class="container">
        <div class="auth-card">
            <h1 style="font-family:'JetBrains Mono'; margin-bottom:10px;">MISSION BOARDS</h1>
            <p style="color:var(--text-secondary); margin-bottom:20px;">Strategic Command Center</p>
            <form id="login-form">
                <input type="email" id="email" placeholder="Cadet ID" required>
                <input type="password" id="password" placeholder="Access Code" required>
                <button type="submit" class="btn btn-primary">INITIALIZE</button>
            </form>
            <p id="auth-error" style="color:var(--accent-red); margin-top:15px; font-size:0.9rem;"></p>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <nav class="navbar">
            <div class="container nav-content">
                <div style="font-weight:700; font-size:1.2rem; display:flex; align-items:center;">
                    MISSION BOARDS <span id="day-badge" class="day-badge">DAY 01</span>
                </div>
                <div style="display:flex; gap:10px;">
                    <button id="logout-btn" class="btn btn-danger" style="padding:6px 12px;">Abort</button>
                </div>
            </div>
        </nav>

        <main class="container">
            <div id="global-status" class="status-panel">
                <div style="flex:1; margin-right:40px;">
                    <div style="display:flex; justify-content:space-between; font-size:0.85rem; color:var(--text-secondary);">
                        <span>Mission Completion</span> <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>
                </div>
                <div id="timer-display" style="font-family:'JetBrains Mono'; color:var(--accent-green);">SYNCING...</div>
            </div>

            <div id="maths-nav-header" class="hidden" style="margin: 30px 0; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2 id="maths-header-title" style="font-family: 'JetBrains Mono'; margin: 0; color: var(--text-main);">Maths Chapter</h2>
                    <span id="maths-header-subtitle" style="font-size: 0.85rem; color: var(--text-secondary);">Progress Status</span>
                </div>
                <button id="static-back-btn" class="btn btn-outline" style="border-color: var(--accent-blue); color: var(--accent-blue);">
                    ← Back to Dashboard
                </button>
            </div>

            <div id="content-area"></div>
        </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script src="https://www.youtube.com/iframe_api"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/maths_data.js"></script>
    <script src="js/curriculum.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
