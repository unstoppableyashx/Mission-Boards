<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Mission | Student Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --card-bg: #1e293b; 
            --primary: #3b82f6; 
            --primary-hover: #2563eb;
            --text-white: #ffffff; 
            --text-gray: #94a3b8; 
            --border: #334155; 
            --danger: #ef4444;
            --success: #10b981;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Disable Text Selection */
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-white); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            user-select: none; /* Text Select Block */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        
        /* Allow text selection inside inputs only */
        input { user-select: text !important; -webkit-user-select: text !important; }

        .main-container { display: flex; width: 1000px; max-width: 95%; background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); min-height: 600px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        
        .brand-side { flex: 1; background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(15, 23, 42, 0.9) 100%), url('https://source.unsplash.com/random/800x600/?library,study') no-repeat center/cover; padding: 40px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .brand-side::before { content: ''; position: absolute; inset: 0; background: rgba(15, 23, 42, 0.85); }
        .brand-content { position: relative; z-index: 2; }
        .brand-side h1 { font-size: 2.8rem; margin-bottom: 15px; color: white; font-weight: 700; letter-spacing: -1px; }
        
        .form-side { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-gray); margin-bottom: 6px; font-weight: 500; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i.field-icon { position: absolute; left: 12px; color: var(--text-gray); font-size: 0.9rem; transition: 0.3s; }
        
        .input-wrapper input { 
            width: 100%; padding: 12px 12px 12px 40px; 
            background: #0f172a; border: 1px solid var(--border); 
            border-radius: 8px; color: white; font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        
        .input-wrapper input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); outline: none; }
        .input-wrapper input:focus + i.field-icon { color: var(--primary); }

        .toggle-password { position: absolute; right: 12px; cursor: pointer; color: var(--text-gray); font-size: 0.9rem; }
        .toggle-password:hover { color: white; }

        .submit-btn { 
            width: 100%; padding: 12px; background: var(--primary); color: white; border: none; 
            border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; 
            transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .submit-btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .google-btn { 
            width: 100%; padding: 12px; background: white; color: #333; border: none; 
            border-radius: 8px; font-weight: 600; cursor: pointer; margin-bottom: 20px; 
            display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; 
        }
        .google-btn:hover { background: #f1f5f9; }
        
        .divider { display: flex; align-items: center; margin: 20px 0; color: var(--text-gray); font-size: 0.8rem; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        .divider span { padding: 0 10px; }

        .alert-box { 
            margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 0.85rem; 
            display: none; align-items: center; gap: 8px;
        }
        .alert-error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--danger); }
        .alert-success { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); color: var(--success); }

        @media (max-width: 768px) { .brand-side { display: none; } .form-side { padding: 25px; } }
    </style>
</head>
<body ondragstart="return false">

    <div class="main-container">
        <div class="brand-side">
            <div class="brand-content">
                <h1>Mission Boards</h1>
                <p style="color:#cbd5e1; font-size: 1.1rem; line-height: 1.6;">Join the disciplined path to success. Track your daily progress and master your curriculum.</p>
                <div style="margin-top: 30px; display: flex; gap: 15px;">
                    <div style="background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 8px; backdrop-filter: blur(5px);">
                        <i class="fas fa-video" style="color: var(--primary);"></i> Daily Videos
                    </div>
                    <div style="background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 8px; backdrop-filter: blur(5px);">
                        <i class="fas fa-fire" style="color: #f59e0b;"></i> Streak Mode
                    </div>
                </div>
            </div>
        </div>

        <div class="form-side">
            <h2 style="margin-bottom:5px;">Create Account</h2>
            <p style="color:var(--text-gray); font-size:0.9rem; margin-bottom:25px;">Start your learning journey today</p>

            <button class="google-btn" onclick="handleGoogleLogin()">
                <i class="fab fa-google" style="color:#DB4437;"></i> Continue with Google
            </button>

            <div class="divider"><span>OR REGISTER WITH EMAIL</span></div>

            <form id="signup-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user field-icon"></i>
                        <input type="text" id="name" required placeholder="Your Name" autocomplete="off">
                    </div>
                </div>

                <div class="input-group">
                    <label>Mobile Number</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone field-icon"></i>
                        <input type="tel" id="mobile" required placeholder="10-digit Mobile Number" 
                               maxlength="10" pattern="[0-9]{10}"
                               oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10)" autocomplete="off">
                    </div>
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope field-icon"></i>
                        <input type="email" id="email" required placeholder="Your Email" autocomplete="off">
                    </div>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock field-icon"></i>
                        <input type="password" id="password" required minlength="6" placeholder="Min 6 characters">
                        <i class="fas fa-eye toggle-password" id="togglePassword" onclick="togglePass()"></i>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    Register Account <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div id="msg-box" class="alert-box"></div>

            <p style="text-align:center; margin-top:20px; font-size:0.9rem; color:#94a3b8;">
                Already have an account? <a href="index.html" style="color:var(--primary); text-decoration: none; font-weight: 600;">Login</a>
            </p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    
    <script>
        // ----------------------------------------------------
        // 🔒 SECURITY BLOCK: Disable Right Click & Inspect
        // ----------------------------------------------------
        
        // 1. Disable Right Click
        document.addEventListener('contextmenu', event => event.preventDefault());

        // 2. Disable Keyboard Shortcuts (F12, Ctrl+U, Ctrl+Shift+I/J/C)
        document.addEventListener('keydown', function(e) {
            // F12
            if(e.key === 'F12') {
                e.preventDefault();
                return false;
            }
            // Ctrl + Shift + I (Inspect)
            if(e.ctrlKey && e.shiftKey && e.key === 'I') {
                e.preventDefault();
                return false;
            }
            // Ctrl + Shift + J (Console)
            if(e.ctrlKey && e.shiftKey && e.key === 'J') {
                e.preventDefault();
                return false;
            }
            // Ctrl + Shift + C (Element Inspector)
            if(e.ctrlKey && e.shiftKey && e.key === 'C') {
                e.preventDefault();
                return false;
            }
            // Ctrl + U (View Source)
            if(e.ctrlKey && e.key === 'u') {
                e.preventDefault();
                return false;
            }
        });

        // ----------------------------------------------------
        // ⚙️ APP LOGIC
        // ----------------------------------------------------

        function togglePass() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('togglePassword');
            if (passInput.type === "password") {
                passInput.type = "text";
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passInput.type = "password";
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function showAlert(msg, type) {
            const box = document.getElementById('msg-box');
            box.style.display = 'flex';
            box.className = `alert-box ${type === 'error' ? 'alert-error' : 'alert-success'}`;
            box.innerHTML = type === 'error' ? `<i class="fas fa-exclamation-circle"></i> ${msg}` : msg;
        }

        async function handleGoogleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                
                const doc = await db.collection('users').doc(user.uid).get();
                if (!doc.exists) {
                    await db.collection('users').doc(user.uid).set({
                        name: user.displayName, email: user.email, role: 'student',
                        joinedAt: new Date().toISOString(),
                        currentDay: 1, mathsChapter: 1, progress: 0, streakCount: 1, lastLoginDate: new Date().toDateString()
                    });
                }
                window.location.href = "index.html";
            } catch (error) { showAlert(error.message, 'error'); }
        }
    
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const msgBox = document.getElementById('msg-box');
            msgBox.style.display = 'none';

            const name = document.getElementById('name').value;
            const mobile = document.getElementById('mobile').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Strict Validation
            if (mobile.length !== 10) {
                showAlert("Mobile number must be exactly 10 digits.", 'error');
                return;
            }
            if(/^(\d)\1{9}$/.test(mobile)) {
                showAlert("Please enter a valid mobile number (Repeated digits).", 'error');
                return;
            }
            
            btn.disabled = true; 
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Creating Account...';
    
            try {
                const userCred = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCred.user;
    
                await user.sendEmailVerification();
    
                await db.collection('users').doc(user.uid).set({
                    name: name, mobile: mobile, email: email, role: 'student',
                    joinedAt: new Date().toISOString(),
                    currentDay: 1, mathsChapter: 1, progress: 0,
                    streakCount: 1, lastLoginDate: new Date().toDateString()
                });
    
                await auth.signOut();
    
                showAlert(`
                    <div>
                        <strong>✅ Verification Sent!</strong><br>
                        Link sent to <b>${email}</b>. Verify then Login.
                    </div>
                `, 'success');
                
                btn.style.display = "none";
                document.getElementById('signup-form').reset();
    
            } catch (error) {
                btn.disabled = false; 
                btn.innerHTML = 'Register Account <i class="fas fa-arrow-right"></i>';
                
                let errorMsg = error.message;
                if(error.code === 'auth/email-already-in-use') errorMsg = "This email is already registered.";
                if(error.code === 'auth/weak-password') errorMsg = "Password must be at least 6 characters.";
                
                showAlert(errorMsg, 'error');
            }
        });
    </script>
</body>
</html>
